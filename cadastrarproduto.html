<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - Nativus</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
      .botaovoltar {
        margin-top: 10px;
        padding: 11px;
        width: 100%;
        background-color: #6c757d;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        transition: background-color 0.3s;
        display: block;
        text-align: center;
        text-decoration: none;
      }
      .botaovoltar:hover { background-color: #5a6268; }

      /* Prefixo R$ no campo de preço */
      .input-preco-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-preco-wrap span {
        position: absolute;
        left: 10px;
        color: #45a049;
        font-weight: 700;
        font-size: 15px;
        pointer-events: none;
      }
      .input-preco-wrap input {
        padding-left: 34px !important;
      }

      /* Indicador de status */
      .status-badge {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        margin-left: 6px;
        font-weight: 600;
      }
      .badge-ok  { background: #e8f5e9; color: #2e7350; }
      .badge-err { background: #fdecea; color: #c62828; }
    </style>
</head>
<body>

  <div class="login-container">

 
    <h2 style="text-align:center;color:#45a049;margin-bottom:20px;">Cadastrar Produto</h2>

    <form id="formProduto" novalidate>

      <label for="nomeProduto">Nome do produto</label>
      <input type="text" id="nomeProduto" placeholder="Ex.: Cenoura Orgânica">

      <label for="codigoProduto">Código do produto</label>
      <input type="text" id="codigoProduto" placeholder="Ex.: PROD-0001" maxlength="12"
             oninput="formatarCodigo(this)">

      <label for="categoriaProduto">Categoria</label>
      <select id="categoriaProduto">
        <option value="">— Selecione —</option>
        <option value="fruta"> Fruta</option>
        <option value="verdura"> Verdura / Legume</option>
        <option value="folhosa"> Folhosa</option>
        <option value="outro">Outro</option>
      </select>

      <label for="precoProduto">Preço</label>
      <div class="input-preco-wrap">
        <input type="text" id="precoProduto" placeholder="0,00" maxlength="12"
               oninput="formatarPrecoInput(this)" inputmode="numeric">
      </div>
      <small id="preco-preview" style="color:#3a8b5f;font-size:12px;margin-top:3px;display:block;"></small>

      <label for="unidadeProduto">Unidade de venda</label>
      <select id="unidadeProduto">
        <option value="kg">Kg</option>
        <option value="unidade">Unidade</option>
        <option value="maço">Maço</option>
        <option value="caixa">Caixa</option>
      </select>

      <button type="submit">Cadastrar produto</button>
    </form>

    <a href="funcionario.html" class="botaovoltar">Voltar</a>
  </div>

  <script src="funcoes.js"></script>
  <script>
    // Máscara código: PROD-0001
    function formatarCodigo(input) {
      let v = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 8);
      if (v.length > 4) v = v.slice(0, 4) + '-' + v.slice(4);
      input.value = v;
    }

    // Máscara preço: digita números → formata como 0,00
    function formatarPrecoInput(input) {
      let raw = input.value.replace(/\D/g, '');
      if (!raw) { input.value = ''; document.getElementById('preco-preview').textContent = ''; return; }
      const num = parseInt(raw, 10) / 100;
      const formatado = num.toFixed(2).replace('.', ',').replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
      input.value = formatado;
      document.getElementById('preco-preview').textContent = 'R$ ' + formatado + ' / ' +
        (document.getElementById('unidadeProduto').value || 'unidade');
    }

    document.getElementById('formProduto').addEventListener('submit', function(e) {
      e.preventDefault();
      const nome   = document.getElementById('nomeProduto').value.trim();
      const codigo = document.getElementById('codigoProduto').value.trim();
      const preco  = document.getElementById('precoProduto').value.trim();

      if (!nome)   { alert('Informe o nome do produto.'); return; }
      if (!preco)  { alert('Informe o preço do produto.'); return; }

      mostrarToast('Produto "' + nome + '" cadastrado com sucesso!');
      setTimeout(() => {
        document.getElementById('formProduto').reset();
        document.getElementById('preco-preview').textContent = '';
      }, 1000);
    });
  </script>
</body>
</html>

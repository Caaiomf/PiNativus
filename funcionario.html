<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Funcionário - Nativus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --nv-green: #3a8b5f;
      --nv-green-dark: #2e7350;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.42)),
                  url("imagens/alimentos-saudaveis-variedade-de-frutas-e-vegetais-organicos_220925-36450.jpg") center/cover fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .nv-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }
    .nv-card-header {
      background: linear-gradient(135deg, var(--nv-green) 0%, var(--nv-green-dark) 100%);
      padding: 1.5rem;
      text-align: center;
    }
    .nv-card-header img { height: 52px; margin-bottom: 6px; }
    .nv-card-header h1 { color:#fff; font-size:1.1rem; font-weight:700; margin:0; }
    .nv-card-header p  { color:rgba(255,255,255,.75); font-size:.8rem; margin:4px 0 0; }

    .form-select:focus {
      border-color: var(--nv-green);
      box-shadow: 0 0 0 .2rem rgba(58,139,95,.18);
    }
    .btn-nv { background-color:var(--nv-green); border-color:var(--nv-green); color:#fff; font-weight:600; }
    .btn-nv:hover { background-color:var(--nv-green-dark); border-color:var(--nv-green-dark); color:#fff; }
  </style>
</head>
<body>
  <div class="nv-card">
    <div class="nv-card-header">
      <a href="cliente.html"><img src="imagens/Design_sem_nome.png" alt="Nativus"></a>
      <h1><i class="fa-solid fa-briefcase me-2"></i>Área do Funcionário</h1>
      <p>Selecione a ferramenta desejada</p>
    </div>

    <div class="p-4">
      <form id="funcForm">
        <div class="mb-4">
          <label for="tipo" class="form-label fw-semibold">Ferramenta</label>
          <select class="form-select" id="tipo" required>
            <option value="">— Selecione —</option>
            <option value="cadastro">📦 Cadastrar produto</option>
            <option value="clienteger">👥 Gerenciar clientes</option>
          </select>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-nv btn-lg">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Entrar
          </button>
          <a href="arealogin.html" class="btn btn-secondary btn-lg">
            <i class="fa-solid fa-arrow-left me-2"></i>Voltar ao login
          </a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="funcoes.js"></script>
</body>
</html>

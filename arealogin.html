<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
<style>
  body {
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.38), rgba(0,0,0,0.38)),
    url("imagens/alimentos-saudaveis-variedade-de-frutas-e-vegetais-organicos_220925-36450.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 28px 16px 40px;
}
</style>
</head>
<body >
 
  <div class="login-container">
  
    <form id="loginForm">
       <div class="card-header" style="display: block;margin-left: auto;margin-right: auto;width: 50%;">
          <a href ="cliente.html"><img href ="cliente.html" src="imagens/Design_sem_nome.png" alt="Nativus"></a>
       </div>
          <h1>Cadastro de Cliente</h1>
          <p>Preencha os dados para criar sua conta</p>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

      <label for="tipo">Tipo de usuário</label>
      <select id="tipo" name="tipo" >
        <option value="">Selecione</option>
        <option value="cliente">Cliente</option>
        <option value="funcionario">Funcionário</option>
        
      </select>

      <button><a href="formulario.html" class="cadastro" style="color: white">Cadastrar-se</a></button>

      <button type="submit">Entrar</button>
      
    </form>
  </div>
  

<script>
  document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault(); 
    const tipoUsuario = document.getElementById('tipo').value;

    if (tipoUsuario === 'cliente') {
      window.location.href = 'cliente.html';
    } else if (tipoUsuario === 'funcionario') {
      window.location.href = 'funcionario.html';
    } else {
      alert('Por favor, selecione um tipo de usuário.');
    }
  });
</script>
</body>
</body>
</html>

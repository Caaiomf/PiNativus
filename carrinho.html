<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Nativus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --nv-green: #3a8b5f;
      --nv-green-dark: #2e7350;
      --nv-green-light: #e8f5e9;
    }
    body { background-color: #f4fdf7; }

    .nv-header {
      background-color: var(--nv-green);
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .nv-header img { height: 48px; }
    .nv-header span { font-size: 1.5rem; font-weight: 700; }

    /* Item card */
    .item-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      transition: box-shadow .2s;
    }
    .item-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.13); }
    .item-card img {
      width: 82px; height: 82px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .item-nome { color: var(--nv-green); font-weight: 700; font-size: .95rem; margin: 0 0 2px; }
    .item-preco { color: #666; font-size: .83rem; margin: 2px 0; }
    .item-sub  { color: var(--nv-green); font-weight: 700; font-size: .9rem; margin-top: 4px; }

    /* Qty controls */
    .qty-btn {
      width: 30px; height: 30px;
      border: 1.5px solid var(--nv-green);
      background: #fff; color: var(--nv-green);
      border-radius: 5px; cursor: pointer;
      font-size: 1rem; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      padding: 0; transition: background .15s;
    }
    .qty-btn:hover { background: var(--nv-green-light); }
    .qty-num { font-weight: 700; min-width: 22px; text-align: center; font-size: .95rem; }

    /* Summary */
    .resumo-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }
    .total-label { font-size: 1.3rem; font-weight: 700; color: #333; }

    /* Buttons */
    .btn-nv { background-color: var(--nv-green); color:#fff; font-weight:600; border-color:var(--nv-green); }
    .btn-nv:hover { background-color:var(--nv-green-dark); border-color:var(--nv-green-dark); color:#fff; }
    .btn-nv-yellow { background-color:#ffc107; color:#333; font-weight:700; border:none; }
    .btn-nv-yellow:hover { background:#e0a800; color:#222; }
  </style>
</head>
<body>

<header class="nv-header shadow-sm">
  <a href="cliente.html"><img src="imagens/Design_sem_nome.png" alt="Nativus"></a>
  <span>Carrinho de Compras</span>
</header>

<div class="container py-4" style="max-width:860px;">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold mb-0" style="color:var(--nv-green);">Itens adicionados</h5>
    <button class="btn btn-sm btn-outline-danger fw-semibold" onclick="limparCarrinho()">
      <i class="fa-solid fa-trash-can me-1"></i>Esvaziar carrinho
    </button>
  </div>

  <!-- Items list -->
  <div id="lista-carrinho" class="d-flex flex-column gap-3 mb-4"></div>

  <!-- Summary -->
  <div class="resumo-card p-3 p-md-4">
    <div id="total-carrinho" class="total-label text-end mb-3">Total: R$ 0,00</div>
    <div class="d-flex flex-column flex-sm-row justify-content-between gap-2">
      <a href="cliente.html" class="btn btn-nv px-4">
        <i class="fa-solid fa-arrow-left me-1"></i>Voltar às compras
      </a>
      <a href="finalizar.html" class="btn btn-nv-yellow px-4">
        <i class="fa-solid fa-check me-1"></i>Finalizar Compra
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="funcoes.js"></script>
<script>
  function renderizarCarrinhoCom() {
    const lista   = document.getElementById('lista-carrinho');
    const totalEl = document.getElementById('total-carrinho');
    if (!lista) return;
    const carrinho = getCarrinho();
    lista.innerHTML = '';
    if (carrinho.length === 0) {
      lista.innerHTML = `
        <div class="text-center py-5 text-muted">
          <i class="fa-solid fa-cart-shopping fa-3x mb-3 opacity-25"></i>
          <p class="fs-5">Seu carrinho está vazio.</p>
          <a href="cliente.html" class="btn btn-nv mt-2" style="background:var(--nv-green);color:#fff;">Ver produtos</a>
        </div>`;
      if (totalEl) totalEl.textContent = 'Total: R$ 0,00';
      return;
    }
    let total = 0;
    carrinho.forEach((item, i) => {
      const qty = item.qty || 1;
      const sub = item.preco * qty;
      total += sub;
      lista.insertAdjacentHTML('beforeend', `
        <div class="item-card p-3 d-flex justify-content-between align-items-center gap-3">
          <div class="d-flex align-items-center gap-3 flex-grow-1">
            <img src="imagens/${item.img}" alt="${item.nome}"
                 onerror="this.src='imagens/Design_sem_nome.png'">
            <div>
              <p class="item-nome">${item.nome}</p>
              <p class="item-preco">R$ ${item.preco.toFixed(2).replace('.', ',')} / unidade</p>
              <div class="d-flex align-items-center gap-2 mt-1">
                <button class="qty-btn" onclick="alterarQty(${i}, -1)">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="alterarQty(${i}, +1)">+</button>
              </div>
              <p class="item-sub">Subtotal: R$ ${sub.toFixed(2).replace('.', ',')}</p>
            </div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="removerDoCarrinho(${i})" title="Remover">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>`);
    });
    if (totalEl) totalEl.textContent = `Total: R$ ${total.toFixed(2).replace('.', ',')}`;
  }

  document.addEventListener('DOMContentLoaded', renderizarCarrinhoCom);
</script>
</body>
</html>
